name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential flex bison libssl-dev libelf-dev bc
      - name: Configure kernel
        run: make defconfig 2>&1 || echo "No defconfig target available"
      - name: Build kernel
        run: make -j$(nproc) 2>&1
